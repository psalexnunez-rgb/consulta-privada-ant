<title>Consulta Privada</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── THEMES ─────────────────────────────────────────── */
:root{
  --sb:#1b3f6e;--sb-hover:#15325a;--sb-pale:#eaf0f9;--sb-pale2:#d4e3f5;
  --bg:#f5f7fa;--surface:#ffffff;--surface2:#f0f3f8;
  --border:#e0e6ef;--border2:#c8d4e8;
  --text:#1a2035;--text2:#4a5578;--text3:#8c96b0;
  --green:#1a7a5a;--green-bg:#e6f5ef;
  --red:#b83232;--red-bg:#fdeaea;
  --blue:#1a5fa8;--blue-bg:#e8f0fb;
  --accent:#1b3f6e;--accent-pale:#eaf0f9;
  --r:10px;--r-sm:7px;
  --sh:0 1px 3px rgba(27,63,110,.08);--sh-md:0 4px 16px rgba(27,63,110,.12);
  --font:'Inter',-apple-system,sans-serif;--mono:'SF Mono','Fira Mono',monospace;
  --sw:230px;
}
[data-theme="green"]{
  --sb:#1a5c3a;--sb-hover:#134d2f;--sb-pale:#e6f5ef;--sb-pale2:#c3e8d5;
  --accent:#1a5c3a;--accent-pale:#e6f5ef;
  --blue:#1a5c3a;--blue-bg:#e6f5ef;
}
[data-theme="dark"]{
  --sb:#0f0f23;--sb-hover:#1a1a2e;--sb-pale:#1e1e32;--sb-pale2:#2a2a42;
  --bg:#0a0a14;--surface:#111120;--surface2:#1a1a2e;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#f0f0f5;--text2:#8888a0;--text3:#55556a;
  --accent:#7c6aff;--accent-pale:rgba(124,106,255,.15);
  --blue:#7c6aff;--blue-bg:rgba(124,106,255,.15);
  --sh:0 1px 3px rgba(0,0,0,.3);--sh-md:0 4px 16px rgba(0,0,0,.4);
}

/* ── BASE ───────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
.app{display:flex;height:100vh;height:100dvh}

/* ── SIDEBAR ────────────────────────────────────────── */
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--sb);display:flex;flex-direction:column;overflow:hidden;transition:transform .28s cubic-bezier(.4,0,.2,1),background .25s;z-index:50}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.sb-icon{width:35px;height:35px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;font-family:serif;letter-spacing:-1px}
.sb-title{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
.sb-sub{font-size:11px;color:rgba(255,255,255,.4)}
.sync-pill{margin-left:auto;font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);transition:all .3s;flex-shrink:0}
.sync-pill.ok{background:rgba(52,211,153,.2);color:#6ee7b7}
.sync-pill.saving{background:rgba(251,191,36,.2);color:#fcd34d}
.sync-pill.error{background:rgba(248,113,113,.2);color:#fca5a5}
.sb-section{padding:14px 10px 4px}
.sb-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.09em;padding:0 8px 7px}
.nb{display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;border:none;background:none;color:rgba(255,255,255,.6);font-family:var(--font);font-size:13px;border-radius:var(--r-sm);cursor:pointer;text-align:left;transition:all .15s}
.nb:hover{background:rgba(255,255,255,.08);color:#fff}
.nb.active{background:rgba(255,255,255,.15);color:#fff;font-weight:500}
.search-wrap{padding:8px 10px 2px}
.search-input{width:100%;padding:8px 11px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-sm);color:#fff;font-family:var(--font);font-size:13px;outline:none;transition:border-color .2s}
.search-input::placeholder{color:rgba(255,255,255,.3)}
.search-input:focus{border-color:rgba(255,255,255,.35)}
.pat-scroll{flex:1;overflow-y:auto;padding:4px 10px 8px}
.pat-scroll::-webkit-scrollbar{width:3px}
.pat-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.sb-footer{padding:10px;border-top:1px solid rgba(255,255,255,.08)}
.add-btn{width:100%;padding:9px;background:rgba(255,255,255,.1);border:1px dashed rgba(255,255,255,.25);border-radius:var(--r-sm);color:rgba(255,255,255,.8);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.add-btn:hover{background:rgba(255,255,255,.18);color:#fff}

/* ── MAIN ───────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.main-header{height:56px;min-height:56px;padding:0 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);box-shadow:var(--sh);transition:background .25s,border-color .25s}
.hamburger{display:none;width:34px;height:34px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;align-items:center;justify-content:center;font-size:15px;color:var(--text2);flex-shrink:0}
.h-title{font-size:15px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-actions{display:flex;gap:8px;flex-shrink:0}
.main-body{flex:1;overflow-y:auto;padding:22px;transition:background .25s}
.main-body::-webkit-scrollbar{width:4px}
.main-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── BUTTONS ────────────────────────────────────────── */
.btn{padding:8px 14px;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text2);transition:all .15s;white-space:nowrap;box-shadow:var(--sh)}
.btn:hover{background:var(--surface2);color:var(--text)}
.btn-primary{background:var(--sb);border-color:var(--sb);color:#fff;box-shadow:0 2px 8px rgba(27,63,110,.2)}
.btn-primary:hover{background:var(--sb-hover);border-color:var(--sb-hover)}
.btn-danger{color:var(--red);border-color:transparent;background:var(--red-bg);box-shadow:none}
.btn-danger:hover{background:#fad4d4}
.btn-sm{padding:5px 11px;font-size:12px}

/* ── METRICS ────────────────────────────────────────── */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:22px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);transition:background .25s,border-color .25s}
.metric.navy{background:var(--sb);border-color:var(--sb)}
.metric.navy .m-label{color:rgba(255,255,255,.5)}
.metric.navy .m-value{color:#fff}
.metric.navy .m-sub{color:rgba(255,255,255,.35)}
.m-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.m-value{font-size:21px;font-weight:600;line-height:1.1;color:var(--text)}
.m-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* ── TABLE ──────────────────────────────────────────── */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);box-shadow:var(--sh);transition:background .25s,border-color .25s}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;transition:background .25s}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;transition:background .25s}
tr:last-child td{border-bottom:none}
tbody tr{background:var(--surface);transition:background .1s}
tbody tr:hover{background:var(--sb-pale)}

/* ── BADGES ─────────────────────────────────────────── */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.bc{background:var(--green-bg);color:var(--green)}
.bp{background:var(--blue-bg);color:var(--blue)}
.bpe{background:var(--red-bg);color:var(--red)}
.be{background:var(--surface2);color:var(--text3)}

/* ── CHART ──────────────────────────────────────────── */
.chart{display:flex;align-items:flex-end;gap:8px;height:100px;padding-bottom:4px}
.bc2{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bbar{width:100%;border-radius:4px 4px 0 0;background:var(--sb-pale2);min-height:3px;transition:height .4s ease,background .25s}
.bbar:hover{background:var(--sb)}
.blbl{font-size:10px;color:var(--text3);white-space:nowrap}
.bval{font-size:9px;color:var(--text3);white-space:nowrap}

/* ── SECTION TITLE ──────────────────────────────────── */
.stitle{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}

/* ── MODAL ──────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;animation:fi .15s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-md);animation:su .2s cubic-bezier(.4,0,.2,1)}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h3{font-size:16px;font-weight:600;margin-bottom:20px;color:var(--text)}
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;color:var(--text2);font-weight:500;margin-bottom:5px}
.fi2,.fs{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.fi2:focus,.fs:focus{border-color:var(--sb);box-shadow:0 0 0 3px var(--sb-pale)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:22px;padding-top:16px;border-top:1px solid var(--border)}

/* ── TABS ───────────────────────────────────────────── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab{padding:9px 16px;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--font);transition:all .15s;margin-bottom:-1px}
.tab.active{color:var(--text);border-bottom-color:var(--sb)}

/* ── MONTH SUMMARY ──────────────────────────────────── */
.msummary{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--sh)}
.mrow{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.mrow:last-of-type{border-bottom:none}
.mtotal{display:flex;justify-content:space-between;padding:8px 0 0;font-size:13px;font-weight:600;color:var(--text)}

/* ── SETTINGS ───────────────────────────────────────── */
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:20px;transition:background .25s,border-color .25s}
.settings-card h4{font-size:13px;font-weight:600;margin-bottom:16px;color:var(--text)}
.tarifa-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.tarifa-row:last-child{border-bottom:none}
.tarifa-name{font-size:13px;color:var(--text2);font-weight:500}
.tarifa-year{font-size:11px;color:var(--text3)}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.theme-card{border:2px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .2s;text-align:center}
.theme-card:hover{border-color:var(--border2)}
.theme-card.active{border-color:var(--sb)}
.theme-preview{height:48px;border-radius:6px;margin-bottom:8px;display:flex;overflow:hidden}
.theme-preview .tp-sb{width:35%;border-radius:6px 0 0 6px}
.theme-preview .tp-main{flex:1;border-radius:0 6px 6px 0}
.theme-name{font-size:12px;font-weight:500;color:var(--text2)}

/* ── EMPTY / LOADING ────────────────────────────────── */
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px}
.ei{font-size:36px;margin-bottom:10px;opacity:.4}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:220px;gap:12px;color:var(--text3);font-size:13px}
.spinner{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--sb);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sb-overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49}

/* ── RESPONSIVE ─────────────────────────────────────── */
@media(max-width:768px){
  :root{--sw:255px}
  .sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.25)}
  .sb-overlay-bg.visible{display:block}
  .hamburger{display:flex}
  .main-body{padding:14px}
  .metric-grid{grid-template-columns:1fr 1fr;gap:10px}
  .fr{grid-template-columns:1fr}
  .pdg{grid-template-columns:1fr!important}
  .h-actions .btn-danger{display:none}
  .tarifa-row{grid-template-columns:1fr 1fr}
  .tarifa-year{display:none}
  .theme-grid{grid-template-columns:1fr 1fr 1fr}
}
@media(max-width:400px){.m-value{font-size:17px}}
</style>
</head>

// ── SYNC ─────────────────────────────────────────────
function sync(state,txt){
  const el=document.getElementById('sync-pill');if(!el)return;
  el.className='sync-pill '+state;
  el.textContent={ok:'✓ Sync',saving:'Guardando…',error:'Sin conexión'}[state]||txt||'…';
}
function toggleSb(){sbOpen=!sbOpen;document.getElementById('sidebar').classList.toggle('open',sbOpen);document.getElementById('sb-overlay').classList.toggle('visible',sbOpen);}
function closeSb(){sbOpen=false;document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-overlay').classList.remove('visible');}
function fmt(n){return Math.round(n).toLocaleString('es-CL');}
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function badge(estado){
  if(!estado)return'<span class="badge be">Sin estado</span>';
  const m={Cobrado:'bc',Pagado:'bp',Pendiente:'bpe'};
  return`<span class="badge ${m[estado]||'be'}">${estado}</span>`;
}
function allSessions(){let a=[];Object.values(pts).forEach(p=>p.ses.forEach(s=>a.push({...s,paciente:p.nombre})));return a;}

// ── LOAD DATA ────────────────────────────────────────
async function loadData(){
  sync('saving','Cargando…');
  try{
    const{data:pats,error:e1}=await sb.from('pacientes').select('*').order('nombre');
    if(e1)throw e1;
    const{data:sess,error:e2}=await sb.from('sesiones').select('*').order('created_at');
    if(e2)throw e2;
    pts={};
    pats.forEach(p=>{pts[p.id]={id:p.id,nombre:p.nombre,prevision:p.prevision,ses:[]};});
    sess.forEach(s=>{if(pts[s.paciente_id])pts[s.paciente_id].ses.push(s);});
    if(!pats.length){await seedData();return;}
    sync('ok');renderNav();renderDashboard();
  }catch(e){
    sync('error');
    document.getElementById('main-body').innerHTML='<div class="empty"><div class="ei">⚠️</div><p>Error al conectar.<br>Verifica tu conexión a internet.</p></div>';
  }
}
async function seedData(){
  sync('saving','Importando datos…');
  for(const[nombre,d]of Object.entries(SEED)){
    const{data:pat}=await sb.from('pacientes').insert({nombre,prevision:d.p}).select().single();
    if(pat&&d.s.length)await sb.from('sesiones').insert(d.s.map(s=>({paciente_id:pat.id,...s})));
  }
  await loadData();
}

  document.getElementById('patient-nav').innerHTML=list.length
    ?list.map(p=>`<button class="nb ${view==='patient'&&pid===p.id?'active':''}" onclick="showPatient('${esc(p.id)}')">${p.nombre}</button>`).join('')
    :'<div style="padding:8px;font-size:12px;color:rgba(255,255,255,.3)">Sin resultados</div>';
}
function showView(v){
  view=v;pid=null;
  document.querySelectorAll('.nb').forEach(e=>e.classList.remove('active'));
  document.getElementById('nav-'+v)?.classList.add('active');
  renderNav();closeSb();

}

// ── DASHBOARD ────────────────────────────────────────
function renderDashboard(){
  document.getElementById('view-title').textContent='Dashboard';
  document.getElementById('header-actions').innerHTML='';
  const all=allSessions();
  const total=all.reduce((a,s)=>a+s.monto,0);
  const cobrado=all.filter(s=>s.estado==='Cobrado'||s.estado==='Pagado').reduce((a,s)=>a+s.monto,0);
  const pendiente=all.filter(s=>s.estado==='Pendiente').reduce((a,s)=>a+s.monto,0);
  const mon={};MESES.forEach(m=>mon[m]=0);
  all.forEach(s=>{if(s.mes&&mon.hasOwnProperty(s.mes))mon[s.mes]+=s.monto;});
  const act=MESES.filter(m=>mon[m]>0);
  const maxV=Math.max(...Object.values(mon),1);
  const bars=act.map(m=>{const h=Math.max(Math.round((mon[m]/maxV)*88),3);return`<div class="bc2"><div class="bval">$${fmt(mon[m])}</div><div class="bbar" style="height:${h}px"></div><div class="blbl">${m.slice(0,3)}</div></div>`;}).join('');
  const pt={};all.forEach(s=>{pt[s.prevision]=(pt[s.prevision]||0)+s.monto;});
  const pRows=Object.entries(pt).sort((a,b)=>b[1]-a[1]).map(([p,v])=>`<tr><td>${p}</td><td style="color:var(--text3)">${all.filter(s=>s.prevision===p).length} ses.</td><td style="text-align:right;font-weight:600;font-family:var(--mono)">$${fmt(v)}</td></tr>`).join('');
  document.getElementById('main-body').innerHTML=`
    <div class="metric-grid">
      <div class="metric navy"><div class="m-label">Total facturado</div><div class="m-value">$${fmt(total)}</div><div class="m-sub">${all.length} sesiones · ${Object.keys(pts).length} pacientes</div></div>
      <div class="metric"><div class="m-label">Cobrado/Pagado</div><div class="m-value" style="color:var(--green)">$${fmt(cobrado)}</div></div>
      <div class="metric"><div class="m-label">Pendiente</div><div class="m-value" style="color:var(--red)">$${fmt(pendiente)}</div></div>
      <div class="metric"><div class="m-label">Sin gestionar</div><div class="m-value" style="color:var(--text2)">$${fmt(total-cobrado-pendiente)}</div></div>
    </div>
    <div style="margin-bottom:24px"><div class="stitle">Ingresos por mes</div><div class="chart">${bars||'<span style="color:var(--text3);font-size:12px">Sin datos aún</span>'}</div></div>
    <div class="stitle">Por previsión</div>
    <div class="tw"><table><thead><tr><th>Previsión</th><th>Sesiones</th><th style="text-align:right">Total</th></tr></thead><tbody>${pRows}</tbody></table></div>`;
}

}

  const total=p.ses.reduce((a,s)=>a+s.monto,0);
  const cob=p.ses.filter(s=>s.estado==='Cobrado'||s.estado==='Pagado').reduce((a,s)=>a+s.monto,0);
  const rows=p.ses.map((s,i)=>`<tr><td style="color:var(--text3)">${i+1}</td><td style="font-family:var(--mono);font-size:12px">${s.fecha}</td><td style="color:var(--text3)">${s.mes||'—'}</td><td><span style="font-size:11px;background:var(--surface2);padding:2px 7px;border-radius:4px;color:var(--text2)">${s.prevision||'—'}</span></td><td style="font-family:var(--mono)">$${fmt(s.monto)}</td><td>${badge(s.estado)}</td><td style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text3)">${s.observaciones||'—'}</td><td style="white-space:nowrap"><button class="btn btn-sm" onclick="showEditSes('${esc(id)}','${esc(s.id)}')">Editar</button><button class="btn btn-danger btn-sm" style="margin-left:4px" onclick="delSes('${esc(id)}','${esc(s.id)}')">×</button></td></tr>`).join('');
  const mT={};p.ses.forEach(s=>{mT[s.mes]=(mT[s.mes]||0)+s.monto;});
  const mSum=Object.entries(mT).map(([m,v])=>`<div class="mrow"><span style="color:var(--text3)">${m[0].toUpperCase()+m.slice(1)}</span><span style="font-family:var(--mono)">$${fmt(v)}</span></div>`).join('');
  document.getElementById('main-body').innerHTML=`
    <div class="metric-grid" style="margin-bottom:18px">
      <div class="metric navy"><div class="m-label">Total</div><div class="m-value">$${fmt(total)}</div></div>
      <div class="metric"><div class="m-label">Cobrado/Pagado</div><div class="m-value" style="color:var(--green)">$${fmt(cob)}</div></div>
      <div class="metric"><div class="m-label">Sesiones</div><div class="m-value">${p.ses.length}</div></div>
      <div class="metric"><div class="m-label">Previsión</div><div class="m-value" style="font-size:15px">${p.prevision||'—'}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 170px;gap:16px;align-items:start" class="pdg">
      <div><div class="stitle">Sesiones</div>${p.ses.length?`<div class="tw"><table><thead><tr><th>#</th><th>Fecha</th><th>Mes</th><th>Previsión</th><th>Monto</th><th>Estado</th><th>Observaciones</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty"><div class="ei">📋</div><p>Sin sesiones. Usa el botón + Sesión.</p></div>'}</div>
      <div><div class="stitle">Por mes</div><div class="msummary">${mSum||'<div style="font-size:12px;color:var(--text3)">Sin datos</div>'}<div class="mtotal"><span>Total</span><span style="font-family:var(--mono)">$${fmt(total)}</span></div></div></div>
    </div>`;
}

// ── MODALS ───────────────────────────────────────────
function showAddPatient(){
  document.getElementById('modal-root').innerHTML=`<div class="overlay"><div class="modal"><h3>Nuevo paciente</h3><div class="fg"><label class="fl">Nombre completo</label><input class="fi2" id="np-n" type="text" placeholder="Ej: María García" autofocus></div><div class="fg"><label class="fl">Previsión</label><select class="fs" id="np-p">${PREV_LIST.map(p=>`<option>${p}</option>`).join('')}</select></div><div class="mf"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="addPatient()">Crear paciente</button></div></div></div>`;
}
async function addPatient(){
  const nombre=document.getElementById('np-n').value.trim();
  const prevision=document.getElementById('np-p').value;
  if(!nombre){alert('Ingresa el nombre');return;}
  if(Object.values(pts).find(p=>p.nombre===nombre)){alert('Ya existe este paciente');return;}
  sync('saving');
  const{data,error}=await sb.from('pacientes').insert({nombre,prevision}).select().single();
  if(error){sync('error');alert('Error al guardar');return;}
  pts[data.id]={id:data.id,nombre,prevision,ses:[]};
  sync('ok');closeModal();renderNav();showPatient(data.id);
}

function sesForm(id,ses=null){
  const p=pts[id];
  const today=new Date();
  const dd=String(today.getDate()).padStart(2,'0'),mm=String(today.getMonth()+1).padStart(2,'0');
  const dFecha=ses?.fecha||`${dd}/${mm}/${today.getFullYear()}`;
  const dMes=ses?.mes||MESES[today.getMonth()];
  const dPrev=ses?.prevision||p?.ses[p.ses.length-1]?.prevision||p?.prevision||'Fonasa';
  const dMonto=ses?.monto??getTarifa(dPrev);
  const dEst=ses?.estado||'';
  const dObs=ses?.observaciones||'';
  const action=ses?`saveSesEdit('${esc(id)}','${esc(ses.id)}')`:`saveSesNew('${esc(id)}')`;
  document.getElementById('modal-root').innerHTML=`<div class="overlay"><div class="modal">
    <h3>${ses?'Editar':'Nueva'} sesión — ${p?.nombre||''}</h3>
    <div class="fr">
      <div class="fg"><label class="fl">Fecha (DD/MM/AAAA)</label><input class="fi2" id="s-f" type="text" value="${dFecha}"></div>
      <div class="fg"><label class="fl">Mes</label><select class="fs" id="s-m">${MESES.map(m=>`<option value="${m}" ${m===dMes?'selected':''}>${m[0].toUpperCase()+m.slice(1)}</option>`).join('')}</select></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Previsión</label><select class="fs" id="s-p" onchange="autoM()">${PREV_LIST.map(pr=>`<option ${pr===dPrev?'selected':''}>${pr}</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">Monto ($)</label><input class="fi2" id="s-mo" type="number" value="${dMonto}"></div>
    </div>
    <div class="fg"><label class="fl">Estado de pago</label><select class="fs" id="s-e">${ESTADOS.map(e=>`<option value="${e}" ${e===dEst?'selected':''}>${e||'Sin estado'}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Observaciones</label><input class="fi2" id="s-o" type="text" value="${dObs}" placeholder="Notas opcionales…"></div>
    <div class="mf"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="${action}">Guardar</button></div>
  </div></div>`;
}
function showAddSes(id){sesForm(id);}
function showEditSes(id,sid){const s=pts[id]?.ses.find(x=>x.id===sid);if(s)sesForm(id,s);}
function autoM(){const p=document.getElementById('s-p')?.value;if(p)document.getElementById('s-mo').value=getTarifa(p);}
function getSesData(){return{fecha:document.getElementById('s-f').value.trim(),mes:document.getElementById('s-m').value,prevision:document.getElementById('s-p').value,monto:parseInt(document.getElementById('s-mo').value)||0,estado:document.getElementById('s-e').value,observaciones:document.getElementById('s-o').value.trim()};}

async function saveSesNew(id){
  const data={paciente_id:id,...getSesData()};sync('saving');
  const{data:saved,error}=await sb.from('sesiones').insert(data).select().single();
  if(error){sync('error');alert('Error al guardar');return;}
  pts[id].ses.push(saved);sync('ok');closeModal();renderPatient(id);
}
async function saveSesEdit(id,sid){
  const data=getSesData();sync('saving');
  const{error}=await sb.from('sesiones').update(data).eq('id',sid);
  if(error){sync('error');alert('Error al guardar');return;}
  const i=pts[id].ses.findIndex(s=>s.id===sid);
  if(i>=0)pts[id].ses[i]={...pts[id].ses[i],...data};
  sync('ok');closeModal();renderPatient(id);
}
async function delSes(id,sid){
  if(!confirm('¿Eliminar esta sesión?'))return;
  sync('saving');
  const{error}=await sb.from('sesiones').delete().eq('id',sid);
  if(error){sync('error');return;}
  pts[id].ses=pts[id].ses.filter(s=>s.id!==sid);sync('ok');renderPatient(id);
}
async function delPatient(id){
  const p=pts[id];
  if(!confirm(`¿Eliminar a ${p?.nombre} y todas sus sesiones?\nNo se puede deshacer.`))return;
  sync('saving');
  const{error}=await sb.from('pacientes').delete().eq('id',id);
  if(error){sync('error');return;}
  delete pts[id];sync('ok');showView('dashboard');
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

loadData();
</script>
</body>
</html>
