<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Consulta">
<meta name="theme-color" content="#f5f7fa" id="theme-color-meta">
<title>Consulta Privada</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231b3f6e'/><text y='.92em' font-size='72' x='10' fill='white'>ψ</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --sb:#1b3f6e;--sb-hover:#15325a;--sb-pale:#eaf0f9;--sb-pale2:#d4e3f5;
  --bg:#f5f7fa;--surface:#ffffff;--surface2:#f0f3f8;
  --border:#e0e6ef;--border2:#c8d4e8;
  --text:#1a2035;--text2:#4a5578;--text3:#8c96b0;
  --green:#1a7a5a;--green-bg:#e6f5ef;
  --red:#b83232;--red-bg:#fdeaea;
  --blue:#1a5fa8;--blue-bg:#e8f0fb;
  --orange:#b86000;--orange-bg:#fff3e0;
  --r:10px;--r-sm:7px;
  --sh:0 1px 3px rgba(27,63,110,.08);--sh-md:0 4px 16px rgba(27,63,110,.12);
  --font:'Inter',-apple-system,sans-serif;--mono:'SF Mono','Fira Mono',monospace;
  --sw:230px;
}
[data-theme="green"]{--sb:#1a5c3a;--sb-hover:#134d2f;--sb-pale:#e6f5ef;--sb-pale2:#c3e8d5;}
[data-theme="dark"]{
  --sb:#0f0f23;--sb-hover:#1a1a2e;--sb-pale:#1e1e32;--sb-pale2:#2a2a42;
  --bg:#0a0a14;--surface:#111120;--surface2:#1a1a2e;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#f0f0f5;--text2:#8888a0;--text3:#55556a;
  --sh:0 1px 3px rgba(0,0,0,.3);--sh-md:0 4px 16px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
.app{display:flex;height:100vh;height:100dvh}

/* LOGIN */
.login-screen{position:fixed;inset:0;background:var(--sb);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.2);text-align:center}
.login-psi{font-size:52px;font-family:serif;color:var(--sb);margin-bottom:6px;font-weight:700;line-height:1}
.login-title{font-size:18px;font-weight:600;color:#1a2035;margin-bottom:4px}
.login-sub{font-size:13px;color:#8c96b0;margin-bottom:24px}
.login-label{display:block;font-size:12px;color:#4a5578;font-weight:500;margin-bottom:5px;text-align:left}
.login-input{width:100%;padding:11px 14px;background:#f5f7fa;border:1px solid #c8d4e8;border-radius:8px;color:#1a2035;font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s;margin-bottom:12px}
.login-input:focus{border-color:#1b3f6e;box-shadow:0 0 0 3px #eaf0f9}
.login-btn{width:100%;padding:12px;background:#1b3f6e;border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:4px}
.login-btn:hover{background:#15325a}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-error{font-size:12px;color:#b83232;margin-top:10px;min-height:18px;background:#fdeaea;border-radius:6px;padding:6px 10px;display:none}
.login-error.show{display:block}
.login-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}

/* SIDEBAR */
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--sb);display:flex;flex-direction:column;overflow:hidden;transition:transform .28s cubic-bezier(.4,0,.2,1),background .25s;z-index:50}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.sb-icon{width:35px;height:35px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;font-family:serif}
.sb-title{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
.sb-sub{font-size:11px;color:rgba(255,255,255,.4)}
.sync-pill{margin-left:auto;font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);transition:all .3s;flex-shrink:0}
.sync-pill.ok{background:rgba(52,211,153,.2);color:#6ee7b7}
.sync-pill.saving{background:rgba(251,191,36,.2);color:#fcd34d}
.sync-pill.error{background:rgba(248,113,113,.2);color:#fca5a5}
.sb-section{padding:14px 10px 4px}
.sb-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.09em;padding:0 8px 7px}
.nb{display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;border:none;background:none;color:rgba(255,255,255,.6);font-family:var(--font);font-size:13px;border-radius:var(--r-sm);cursor:pointer;text-align:left;transition:all .15s}
.nb:hover{background:rgba(255,255,255,.08);color:#fff}
.nb.active{background:rgba(255,255,255,.15);color:#fff;font-weight:500}
.nb.alta{opacity:.5;font-style:italic}
.search-wrap{padding:8px 10px 2px}
.search-input{width:100%;padding:8px 11px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-sm);color:#fff;font-family:var(--font);font-size:13px;outline:none;transition:border-color .2s}
.search-input::placeholder{color:rgba(255,255,255,.3)}
.search-input:focus{border-color:rgba(255,255,255,.35)}
.pat-scroll{flex:1;overflow-y:auto;padding:4px 10px 8px}
.pat-scroll::-webkit-scrollbar{width:3px}
.pat-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.filter-toggle{margin:4px 10px 0;display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.4);cursor:pointer;padding:4px 8px;border-radius:var(--r-sm);transition:all .15s;border:none;background:none;width:calc(100% - 20px)}
.filter-toggle:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
.sb-footer{padding:10px;border-top:1px solid rgba(255,255,255,.08)}
.add-btn{width:100%;padding:9px;background:rgba(255,255,255,.1);border:1px dashed rgba(255,255,255,.25);border-radius:var(--r-sm);color:rgba(255,255,255,.8);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.add-btn:hover{background:rgba(255,255,255,.18);color:#fff}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.main-header{height:56px;min-height:56px;padding:0 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);box-shadow:var(--sh);transition:background .25s,border-color .25s}
.hamburger{display:none;width:34px;height:34px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;align-items:center;justify-content:center;font-size:15px;color:var(--text2);flex-shrink:0}
.h-title{font-size:15px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-actions{display:flex;gap:8px;flex-shrink:0}
.main-body{flex:1;overflow-y:auto;padding:22px;transition:background .25s}
.main-body::-webkit-scrollbar{width:4px}
.main-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* BUTTONS */
.btn{padding:8px 14px;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text2);transition:all .15s;white-space:nowrap;box-shadow:var(--sh)}
.btn:hover{background:var(--surface2);color:var(--text)}
.btn-primary{background:var(--sb);border-color:var(--sb);color:#fff;box-shadow:0 2px 8px rgba(27,63,110,.2)}
.btn-primary:hover{background:var(--sb-hover);border-color:var(--sb-hover)}
.btn-danger{color:var(--red);border-color:transparent;background:var(--red-bg);box-shadow:none}
.btn-danger:hover{background:#fad4d4}
.btn-warning{color:var(--orange);border-color:transparent;background:var(--orange-bg);box-shadow:none}
.btn-warning:hover{background:#ffe0b2}
.btn-success{color:var(--green);border-color:transparent;background:var(--green-bg);box-shadow:none}
.btn-success:hover{background:#c8eadb}
.btn-sm{padding:5px 11px;font-size:12px}

/* METRICS */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:22px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);transition:background .25s,border-color .25s}
.metric.navy{background:var(--sb);border-color:var(--sb)}
.metric.navy .m-label{color:rgba(255,255,255,.5)}
.metric.navy .m-value{color:#fff}
.metric.navy .m-sub{color:rgba(255,255,255,.35)}
.m-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.m-value{font-size:20px;font-weight:600;line-height:1.1;color:var(--text)}
.m-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* TABLE */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);box-shadow:var(--sh);transition:background .25s,border-color .25s}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;transition:background .25s}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;transition:background .25s}
tr:last-child td{border-bottom:none}
tbody tr{background:var(--surface);transition:background .1s}
tbody tr:hover{background:var(--sb-pale)}

/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.b-cobrado{background:var(--green-bg);color:var(--green)}
.b-pagado{background:var(--blue-bg);color:var(--blue)}
.b-pendiente{background:var(--red-bg);color:var(--red)}
.b-empty{background:var(--surface2);color:var(--text3)}
.b-alta{background:var(--orange-bg);color:var(--orange)}

/* CHART */
.chart{display:flex;align-items:flex-end;gap:8px;height:100px;padding-bottom:4px}
.bc2{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bbar{width:100%;border-radius:4px 4px 0 0;background:var(--sb-pale2);min-height:3px;transition:height .4s ease,background .25s}
.bbar:hover{background:var(--sb)}
.blbl{font-size:10px;color:var(--text3);white-space:nowrap}
.bval{font-size:9px;color:var(--text3);white-space:nowrap}
.stitle{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;animation:fi .15s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-md);animation:su .2s cubic-bezier(.4,0,.2,1)}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h3{font-size:16px;font-weight:600;margin-bottom:20px;color:var(--text)}
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;color:var(--text2);font-weight:500;margin-bottom:5px}
.fi2,.fs{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.fi2:focus,.fs:focus{border-color:var(--sb);box-shadow:0 0 0 3px var(--sb-pale)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:22px;padding-top:16px;border-top:1px solid var(--border)}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab{padding:9px 16px;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--font);transition:all .15s;margin-bottom:-1px}
.tab.active{color:var(--text);border-bottom-color:var(--sb)}

/* MONTH SUMMARY */
.msummary{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--sh)}
.mrow{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.mrow:last-of-type{border-bottom:none}
.mtotal{display:flex;justify-content:space-between;padding:8px 0 0;font-size:13px;font-weight:600;color:var(--text)}

/* SETTINGS */
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:20px;transition:background .25s,border-color .25s}
.settings-card h4{font-size:13px;font-weight:600;margin-bottom:16px;color:var(--text)}
.tarifa-row{display:grid;grid-template-columns:1fr 80px 130px;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.tarifa-row:last-child{border-bottom:none}
.tarifa-name{font-size:13px;color:var(--text2);font-weight:500}
.tarifa-year{font-size:11px;color:var(--text3);text-align:center}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.theme-card{border:2px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .2s;text-align:center}
.theme-card:hover{border-color:var(--border2)}
.theme-card.active{border-color:var(--sb)}
.theme-preview{height:48px;border-radius:6px;margin-bottom:8px;display:flex;overflow:hidden}
.theme-preview .tp-sb{width:35%;border-radius:6px 0 0 6px}
.theme-preview .tp-main{flex:1;border-radius:0 6px 6px 0}
.theme-name{font-size:12px;font-weight:500;color:var(--text2)}

/* EMPTY / LOADING */
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px}
.ei{font-size:36px;margin-bottom:10px;opacity:.4}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:220px;gap:12px;color:var(--text3);font-size:13px}
.spinner{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--sb);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sb-overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49}

/* OBSERVATION POPUP */
.obs-popup{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;animation:fi .15s ease}
.obs-box{background:var(--surface);border-radius:14px;padding:22px;width:100%;max-width:340px;box-shadow:var(--sh-md)}
.obs-box h4{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text)}
.obs-box p{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap}
.obs-box .obs-empty{color:var(--text3);font-style:italic}
.obs-close{margin-top:16px;width:100%;padding:9px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;color:var(--text2)}
.obs-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:2px 4px;border-radius:4px;transition:background .15s;line-height:1}
.obs-btn:hover{background:var(--surface2)}

/* Portrait mobile */
@media(max-width:768px){
  :root{--sw:255px}
  .sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:6px 0 32px rgba(0,0,0,.3)}
  .sb-overlay-bg.visible{display:block}
  .hamburger{display:flex}
  .main-body{padding:12px}
  .metric-grid{grid-template-columns:1fr 1fr;gap:8px}
  .metric{padding:12px 14px}
  .metric.navy{padding:14px 18px}
  .metric.navy .m-value{font-size:17px;word-break:break-all}
  .m-value{font-size:18px}
  .fr{grid-template-columns:1fr}
  .pdg{grid-template-columns:1fr!important}
  .tarifa-row{grid-template-columns:1fr 110px}
  .tarifa-year{display:none}
  .h-actions .btn-danger{display:none}
  .col-obs{display:none}
  td,th{padding:8px 8px}
  .h-title{font-size:14px}
}
@media(max-width:400px){.m-value{font-size:16px};.metric{padding:10px 11px}}

/* Landscape mobile — maximize patient list visibility */
@media(max-height:500px) and (max-width:900px){
  :root{--sw:240px}
  .sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:6px 0 32px rgba(0,0,0,.3)}
  /* Compact logo area */
  .sb-logo{padding:8px 12px;min-height:0}
  .sb-icon{width:26px;height:26px;font-size:14px;border-radius:7px}
  .sb-title{font-size:12px}
  .sb-sub{display:none}
  .sync-pill{font-size:9px;padding:2px 6px}
  /* Compact nav section */
  .sb-section{padding:6px 8px 2px}
  .sb-label{font-size:9px;padding:0 6px 4px}
  .nb{padding:6px 8px;font-size:12px}
  /* Maximize scrollable patient area */
  .search-wrap{padding:4px 8px 2px}
  .search-input{padding:6px 9px;font-size:12px}
  .filter-toggle{font-size:10px;padding:3px 6px}
  .pat-scroll{padding:2px 8px 4px}
  /* Each patient button smaller */
  .pat-scroll .nb{padding:7px 8px;font-size:12px;border-radius:5px}
  /* Compact footer */
  .sb-footer{padding:6px 8px}
  .add-btn{padding:7px;font-size:12px}
  /* Main header compact */
  .main-header{height:44px;min-height:44px;padding:0 14px}
  .hamburger{display:flex !important}
  .main-body{padding:10px}
  .metric-grid{grid-template-columns:repeat(4,1fr);gap:6px}
  .metric{padding:8px 10px}
  .m-value{font-size:16px}
  .m-label{font-size:10px;margin-bottom:4px}
}

/* iPad portrait — 2x2 grid for metrics */
@media only screen and (min-width:768px) and (max-width:1024px) and (orientation:portrait){
  .metric-grid{grid-template-columns:1fr 1fr !important;gap:14px}
  .metric{padding:18px 22px}
  .metric.navy{padding:18px 22px}
  .metric.navy .m-value{font-size:20px}
  .m-value{font-size:20px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-psi">ψ</div>
    <div class="login-title">Consulta Privada</div>
    <div class="login-sub">Ingresa tus credenciales para continuar</div>
    <label class="login-label">Correo electrónico</label>
    <input class="login-input" type="email" id="login-email" placeholder="tu@email.com" autocomplete="email">
    <label class="login-label">Contraseña</label>
    <input class="login-input" type="password" id="login-pw" placeholder="••••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div class="app" id="main-app" style="display:none">
  <div class="sb-overlay-bg" id="sb-overlay" onclick="closeSb()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sb-icon">ψ</div>
      <div>
        <div class="sb-title">Consulta Privada</div>
        <div class="sb-sub" id="year-label">2026</div>
      </div>
      <div class="sync-pill" id="sync-pill">…</div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Vistas</div>
      <button class="nb active" id="nav-dashboard" onclick="showView('dashboard')">◈ &nbsp;Dashboard</button>
      <button class="nb" id="nav-resumen" onclick="showView('resumen')">≋ &nbsp;Resumen general</button>

async function loadData(){
  sync('saving','Cargando…');
  try{
    const{data:pats,error:e1}=await sb.from('pacientes').select('*').order('nombre');

  }catch(e){
    sync('error');
    document.getElementById('main-body').innerHTML='<div class="empty"><div class="ei">⚠️</div><p>Error al conectar.<br>Verifica tu conexión.</p></div>';

function renderDashboard(){

  const total=all.reduce((a,s)=>a+s.monto,0);
  const cobrado=all.filter(s=>s.estado==='Cobrado').reduce((a,s)=>a+s.monto,0);
  const pagado=all.filter(s=>s.estado==='Pagado').reduce((a,s)=>a+s.monto,0);
  const pendiente=all.filter(s=>s.estado==='Pendiente').reduce((a,s)=>a+s.monto,0);
  const monMap={};
  all.forEach(s=>{
    const yr=s.fecha?s.fecha.split('/')[2]:String(CUR_YEAR);
    const key=`${yr}-${String(MESES.indexOf(s.mes)+1).padStart(2,'0')}`;
    if(MESES.indexOf(s.mes)>=0)monMap[key]=(monMap[key]||0)+s.monto;
  });
  const sortedKeys=Object.keys(monMap).sort();
  const maxV=Math.max(...Object.values(monMap),1);
  const bars=sortedKeys.map(k=>{
    const[yr,m]=k.split('-');
    const label=MESES[parseInt(m)-1].slice(0,3)+' '+yr.slice(2);

    return`<div class="bc2"><div class="bval">$${fmt(monMap[k])}</div><div class="bbar" style="height:${h}px"></div><div class="blbl">${label}</div></div>`;

  const nAlta=Object.values(pts).filter(p=>p.alta).length;
  document.getElementById('main-body').innerHTML=`
    <div class="metric-grid">
      <div class="metric navy" style="padding:18px 20px"><div class="m-label">Total facturado</div><div class="m-value">$${fmt(total)}</div><div class="m-sub">${all.length} ses. · ${nActivos} activos${nAlta?` · ${nAlta} alta`:''}</div></div>
      <div class="metric"><div class="m-label">Cobrado</div><div class="m-value" style="color:var(--green)">$${fmt(cobrado)}</div><div class="m-sub">${all.filter(s=>s.estado==='Cobrado').length} sesiones</div></div>
      <div class="metric"><div class="m-label">Pagado</div><div class="m-value" style="color:var(--blue)">$${fmt(pagado)}</div><div class="m-sub">${all.filter(s=>s.estado==='Pagado').length} sesiones</div></div>
      <div class="metric"><div class="m-label">Pendiente</div><div class="m-value" style="color:var(--red)">$${fmt(pendiente)}</div><div class="m-sub">${all.filter(s=>s.estado==='Pendiente').length} sesiones</div></div>
    </div>
    <div style="margin-bottom:24px"><div class="stitle">Ingresos por mes</div><div class="chart">${bars||'<span style="color:var(--text3);font-size:12px">Sin datos aún</span>'}</div></div>
    <div class="stitle">Por previsión</div>
    <div class="tw"><table><thead><tr><th>Previsión</th><th>Sesiones</th><th style="text-align:right">Total</th></tr></thead><tbody>${pRows}</tbody></table></div>`;
}

// ── RESUMEN ───────────────────────────────────────────
function renderResumen(){
  document.getElementById('view-title').textContent='Resumen general';
  document.getElementById('header-actions').innerHTML='';
  const all=allSessions();
  const monMap={};
  all.forEach(s=>{
    const yr=s.fecha?s.fecha.split('/')[2]:String(CUR_YEAR);
    const mesIdx=MESES.indexOf(s.mes);if(mesIdx<0)return;
    const key=`${yr}-${String(mesIdx+1).padStart(2,'0')}`;
    if(!monMap[key])monMap[key]={yr,mes:s.mes,ses:[],total:0,cob:0,pag:0,pen:0};
    monMap[key].ses.push(s);monMap[key].total+=s.monto;
    if(s.estado==='Cobrado')monMap[key].cob+=s.monto;
    else if(s.estado==='Pagado')monMap[key].pag+=s.monto;
    else if(s.estado==='Pendiente')monMap[key].pen+=s.monto;
  });
  const IMPUESTO=0.1525;
  const mRows=Object.keys(monMap).sort().map(k=>{
    const d=monMap[k];
    const label=d.mes[0].toUpperCase()+d.mes.slice(1)+' '+d.yr;
    const imp=Math.round(d.total*IMPUESTO);
    const liquido=d.total-imp-costoConsulta;
    return`<tr>
      <td style="font-weight:500">${label}</td>
      <td style="color:var(--text3)">${d.ses.length}</td>
      <td style="font-family:var(--mono)">$${fmt(d.total)}</td>
      <td style="color:var(--green);font-family:var(--mono)">$${fmt(d.cob)}</td>
      <td style="color:var(--blue);font-family:var(--mono)">$${fmt(d.pag)}</td>
      <td style="color:var(--red);font-family:var(--mono)">$${fmt(d.pen)}</td>
      <td style="color:var(--orange);font-family:var(--mono);font-size:12px">-$${fmt(imp)}</td>
      <td style="color:var(--text3);font-family:var(--mono);font-size:12px">-$${fmt(costoConsulta)}</td>
      <td style="font-family:var(--mono);font-weight:600;color:${liquido>=0?'var(--navy)':'var(--red)'};background:${liquido>=0?'var(--sb-pale)':'var(--red-bg)'}">$${fmt(liquido)}</td>
    </tr>`;
  }).join('');
  const total=all.reduce((a,s)=>a+s.monto,0);
  const cob=all.filter(s=>s.estado==='Cobrado').reduce((a,s)=>a+s.monto,0);
  const pag=all.filter(s=>s.estado==='Pagado').reduce((a,s)=>a+s.monto,0);
  const pen=all.filter(s=>s.estado==='Pendiente').reduce((a,s)=>a+s.monto,0);
  const nMeses=Object.keys(monMap).length;
  const totalImp=Math.round(total*IMPUESTO);
  const totalCosto=costoConsulta*12;
  const totalLiquido=total-totalImp-totalCosto;
  const pRows=Object.values(pts).sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(p=>{
    const t=p.ses.reduce((a,s)=>a+s.monto,0);
    const c=p.ses.filter(s=>s.estado==='Cobrado').reduce((a,s)=>a+s.monto,0);
    const pg=p.ses.filter(s=>s.estado==='Pagado').reduce((a,s)=>a+s.monto,0);
    const altaBadge=p.alta?'<span class="badge b-alta" style="margin-left:6px">Alta</span>':'';
    return`<tr><td><a href="#" onclick="showPatient('${esc(p.id)}');return false;" style="color:var(--sb);font-weight:500">${p.nombre}</a>${altaBadge}</td><td style="color:var(--text3)">${p.prevision||'—'}</td><td style="color:var(--text3)">${p.ses.length}</td><td style="font-family:var(--mono)">$${fmt(t)}</td><td style="color:var(--green);font-family:var(--mono)">$${fmt(c)}</td><td style="color:var(--blue);font-family:var(--mono)">$${fmt(pg)}</td></tr>`;
  }).join('');
  document.getElementById('main-body').innerHTML=`
    <div class="tabs"><button class="tab active" onclick="switchTab(this,'tm')">Por mes</button><button class="tab" onclick="switchTab(this,'tp')">Por paciente</button></div>
    <div id="tm"><div class="tw"><table><thead><tr>
      <th>Mes</th><th>Ses.</th><th>Total</th>
      <th style="color:var(--green)">Cobrado</th>
      <th style="color:var(--blue)">Pagado</th>
      <th style="color:var(--red)">Pendiente</th>
      <th style="color:var(--orange)">Impuesto 15,25%</th>
      <th style="color:var(--text3)">Costo consulta</th>
      <th style="color:var(--navy)">Líquido</th>
    </tr></thead>
    <tbody>${mRows}
    <tr style="background:var(--surface2);border-top:2px solid var(--border2)">
      <td style="font-weight:600">Total anual</td>
      <td style="color:var(--text3)">${all.length}</td>
      <td style="font-family:var(--mono);font-weight:600">$${fmt(total)}</td>
      <td style="color:var(--green);font-family:var(--mono);font-weight:600">$${fmt(cob)}</td>
      <td style="color:var(--blue);font-family:var(--mono);font-weight:600">$${fmt(pag)}</td>
      <td style="color:var(--red);font-family:var(--mono);font-weight:600">$${fmt(pen)}</td>
      <td style="color:var(--orange);font-family:var(--mono);font-weight:600">-$${fmt(totalImp)}</td>
      <td style="color:var(--text3);font-family:var(--mono);font-weight:600">-$${fmt(totalCosto)}</td>
      <td style="font-family:var(--mono);font-weight:700;font-size:14px;color:${totalLiquido>=0?'var(--navy)':'var(--red)'};background:${totalLiquido>=0?'var(--sb-pale)':'var(--red-bg)'}">$${fmt(totalLiquido)}</td>
    </tr></tbody></table></div></div>
    <div id="tp" style="display:none"><div class="tw"><table><thead><tr><th>Paciente</th><th>Previsión</th><th>Ses.</th><th>Total</th><th style="color:var(--green)">Cobrado</th><th style="color:var(--blue)">Pagado</th></tr></thead><tbody>${pRows}</tbody></table></div></div>`;
}
function switchTab(btn,id){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');['tm','tp'].forEach(t=>{const el=document.getElementById(t);if(el)el.style.display='none';});document.getElementById(id).style.display='';}

        <div class="tarifa-name">Costo mensual consulta</div>
        <div class="tarifa-year">Fijo</div>

      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:10px">Impuesto 2ª categoría: <strong>15,25%</strong> (fijo por ley)</div>

}
function saveTarifa(prev,val){const yr=String(CUR_YEAR);if(!tarifas[prev])tarifas[prev]={};tarifas[prev][yr]=parseInt(val)||0;saveTarifasLocal();}

async function downloadBackup(){
  sync('saving','Exportando…');
  try{
    const{data:pats}=await sb.from('pacientes').select('*').order('nombre');
    const{data:sess}=await sb.from('sesiones').select('*').order('created_at');
    const blob=new Blob([JSON.stringify({fecha:new Date().toISOString(),pacientes:pats,sesiones:sess},null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=`consulta_respaldo_${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(url);sync('ok');
  }catch(e){sync('error');}
}

function renderPatient(id){
  const p=pts[id];if(!p)return;
  document.getElementById('view-title').textContent=p.nombre;
  const altaBtn=p.alta
    ?`<button class="btn btn-success btn-sm" onclick="toggleAlta('${esc(id)}',false)">↩ Reactivar</button>`
    :`<button class="btn btn-warning btn-sm" onclick="toggleAlta('${esc(id)}',true)">✓ Dar de alta</button>`;
  document.getElementById('header-actions').innerHTML=`
    <button class="btn btn-primary btn-sm" onclick="showAddSes('${esc(id)}')">+ Sesión</button>
    ${altaBtn}
    <button class="btn btn-danger btn-sm" onclick="delPatient('${esc(id)}')">Eliminar</button>`;

      </td>
    </tr>`;}).join('');
  const mT={};
  p.ses.forEach(s=>{
    const yr=s.fecha?s.fecha.split('/')[2]:String(CUR_YEAR);
    const mesIdx=MESES.indexOf(s.mes);if(mesIdx<0)return;
    const key=`${yr}-${String(mesIdx+1).padStart(2,'0')}`;
    if(!mT[key])mT[key]={label:s.mes[0].toUpperCase()+s.mes.slice(1)+' '+yr,total:0};

  const mSum=Object.keys(mT).sort().map(k=>`<div class="mrow"><span style="color:var(--text3)">${mT[k].label}</span><span style="font-family:var(--mono)">$${fmt(mT[k].total)}</span></div>`).join('');
  const altaNote=p.alta?`<div style="background:var(--orange-bg);border:1px solid var(--orange);border-radius:var(--r-sm);padding:10px 14px;font-size:12px;color:var(--orange);margin-bottom:16px">✓ Paciente dado de alta — sus datos se incluyen en todos los cálculos</div>`:'';
  document.getElementById('main-body').innerHTML=`

    <div class="metric-grid" style="margin-bottom:18px">

      <div class="metric"><div class="m-label">Pagado</div><div class="m-value" style="color:var(--blue)">$${fmt(pag)}</div><div class="m-sub">${p.ses.filter(s=>s.estado==='Pagado').length} sesiones</div></div>
      <div class="metric"><div class="m-label">Pendiente</div><div class="m-value" style="color:var(--red)">$${fmt(p.ses.filter(s=>s.estado==='Pendiente').reduce((a,s)=>a+s.monto,0))}</div><div class="m-sub">${p.ses.filter(s=>s.estado==='Pendiente').length} sesiones</div></div>
    </div>

      <div><div class="stitle">Sesiones</div>${p.ses.length?`<div class="tw"><table><thead><tr><th>#</th><th>Fecha</th><th>Mes</th><th>Previsión</th><th>Monto</th><th>Estado</th><th class="col-obs">Observaciones</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty"><div class="ei">📋</div><p>Sin sesiones. Usa el botón + Sesión.</p></div>'}</div>
      <div><div class="stitle">Por mes</div><div class="msummary">${mSum||'<div style="font-size:12px;color:var(--text3)">Sin datos</div>'}<div class="mtotal"><span>Total</span><span style="font-family:var(--mono)">$${fmt(total)}</span></div></div></div>
    </div>`;
}

async function addPatient(){
  const nombre=document.getElementById('np-n').value.trim();
  const prevision=document.getElementById('np-p').value;
  if(!nombre){alert('Ingresa el nombre');return;}
  if(Object.values(pts).find(p=>p.nombre===nombre)){alert('Ya existe este paciente');return;}
  sync('saving');
  const{data,error}=await sb.from('pacientes').insert({nombre,prevision,alta:false}).select().single();
  if(error){sync('error');alert('Error al guardar');return;}

function sesForm(id,ses=null){
  const p=pts[id];
  const today=new Date();
  const dd=String(today.getDate()).padStart(2,'0'),mm=String(today.getMonth()+1).padStart(2,'0');
  const dFecha=ses?.fecha||`${dd}/${mm}/${today.getFullYear()}`;
  const dMes=ses?.mes||MESES[today.getMonth()];
  const dPrev=ses?.prevision||p?.ses[p.ses.length-1]?.prevision||p?.prevision||'Fonasa';
  const dMonto=ses?.monto??getTarifa(dPrev);
  const dEst=ses?.estado||'';const dObs=ses?.observaciones||'';
  const action=ses?`saveSesEdit('${esc(id)}','${esc(ses.id)}')`:`saveSesNew('${esc(id)}')`;
  document.getElementById('modal-root').innerHTML=`<div class="overlay"><div class="modal">
    <h3>${ses?'Editar':'Nueva'} sesión — ${p?.nombre||''}</h3>
    <div class="fr">
      <div class="fg"><label class="fl">Fecha (DD/MM/AAAA)</label><input class="fi2" id="s-f" type="text" value="${dFecha}"></div>
      <div class="fg"><label class="fl">Mes</label><select class="fs" id="s-m">${MESES.map(m=>`<option value="${m}" ${m===dMes?'selected':''}>${m[0].toUpperCase()+m.slice(1)}</option>`).join('')}</select></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Previsión</label><select class="fs" id="s-p" onchange="autoM()">${PREV_LIST.map(pr=>`<option ${pr===dPrev?'selected':''}>${pr}</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">Monto ($)</label><input class="fi2" id="s-mo" type="number" value="${dMonto}"></div>
    </div>
    <div class="fg"><label class="fl">Estado de pago</label><select class="fs" id="s-e">${ESTADOS.map(e=>`<option value="${e}" ${e===dEst?'selected':''}>${e||'Sin estado'}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Observaciones</label><input class="fi2" id="s-o" type="text" value="${dObs}" placeholder="Notas opcionales…"></div>
    <div class="mf"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="${action}">Guardar</button></div>
  </div></div>`;
}
function showAddSes(id){sesForm(id);}
function showEditSes(id,sid){const s=pts[id]?.ses.find(x=>x.id===sid);if(s)sesForm(id,s);}
function autoM(){const p=document.getElementById('s-p')?.value;if(p)document.getElementById('s-mo').value=getTarifa(p);}
function getSesData(){return{fecha:document.getElementById('s-f').value.trim(),mes:document.getElementById('s-m').value,prevision:document.getElementById('s-p').value,monto:parseInt(document.getElementById('s-mo').value)||0,estado:document.getElementById('s-e').value,observaciones:document.getElementById('s-o').value.trim()};}

async function saveSesNew(id){
  const data={paciente_id:id,...getSesData()};sync('saving');
  const{data:saved,error}=await sb.from('sesiones').insert(data).select().single();
  if(error){sync('error');alert('Error al guardar');return;}
  pts[id].ses.push(saved);sync('ok');closeModal();renderPatient(id);
}
async function saveSesEdit(id,sid){
  const data=getSesData();sync('saving');
  const{error}=await sb.from('sesiones').update(data).eq('id',sid);
  if(error){sync('error');alert('Error al guardar');return;}
  const i=pts[id].ses.findIndex(s=>s.id===sid);
  if(i>=0)pts[id].ses[i]={...pts[id].ses[i],...data};
  sync('ok');closeModal();renderPatient(id);
}
async function delSes(id,sid){
  if(!confirm('¿Eliminar esta sesión?'))return;sync('saving');
  const{error}=await sb.from('sesiones').delete().eq('id',sid);
  if(error){sync('error');return;}
  pts[id].ses=pts[id].ses.filter(s=>s.id!==sid);sync('ok');renderPatient(id);
}
async function delPatient(id){
  const p=pts[id];
  if(!confirm(`¿Eliminar a ${p?.nombre} y todas sus sesiones?\nNo se puede deshacer.`))return;sync('saving');
  const{error}=await sb.from('pacientes').delete().eq('id',id);
  if(error){sync('error');return;}
  delete pts[id];sync('ok');showView('dashboard');
}

}

async function generatePdf(){
  const year=document.getElementById('pdf-year')?.value||String(CUR_YEAR);
  closeModal();
  sync('saving','Generando PDF…');

  const all=allSessions();
  const yearSessions=all.filter(s=>s.fecha&&s.fecha.split('/')[2]===year);

  // Pacientes con sesiones en el año (incluye dados de alta)
  const patientsWithSessions=Object.values(pts)
    .filter(p=>p.ses.some(s=>s.fecha&&s.fecha.split('/')[2]===year))
    .sort((a,b)=>a.nombre.localeCompare(b.nombre));

  // Totales generales
  const total=yearSessions.reduce((a,s)=>a+s.monto,0);
  const cobrado=yearSessions.filter(s=>s.estado==='Cobrado').reduce((a,s)=>a+s.monto,0);
  const pagado=yearSessions.filter(s=>s.estado==='Pagado').reduce((a,s)=>a+s.monto,0);
  const pendiente=yearSessions.filter(s=>s.estado==='Pendiente').reduce((a,s)=>a+s.monto,0);
  const sinGestionar=total-cobrado-pagado-pendiente;

  // Por mes
  const monMap={};
  yearSessions.forEach(s=>{
    const mesIdx=MESES.indexOf(s.mes);if(mesIdx<0)return;
    const key=String(mesIdx+1).padStart(2,'0');
    if(!monMap[key])monMap[key]={mes:s.mes,total:0,cob:0,pag:0,pen:0,n:0};
    monMap[key].total+=s.monto;monMap[key].n++;
    if(s.estado==='Cobrado')monMap[key].cob+=s.monto;
    else if(s.estado==='Pagado')monMap[key].pag+=s.monto;
    else if(s.estado==='Pendiente')monMap[key].pen+=s.monto;
  });
  const sortedMon=Object.keys(monMap).sort().map(k=>({...monMap[k],key:k}));

  // Por previsión
  const prevMap={};
  yearSessions.forEach(s=>{prevMap[s.prevision]=(prevMap[s.prevision]||{total:0,n:0});prevMap[s.prevision].total+=s.monto;prevMap[s.prevision].n++;});

  // Gráfico SVG
  const maxV=Math.max(...sortedMon.map(m=>m.total),1);
  const barW=sortedMon.length>0?Math.floor(460/sortedMon.length)-4:40;
  const bars=sortedMon.map((m,i)=>{
    const h=Math.max(Math.round((m.total/maxV)*80),2);
    const x=i*(barW+4)+10;
    const label=m.mes.slice(0,3);
    return`<rect x="${x}" y="${90-h}" width="${barW}" height="${h}" fill="#1b3f6e" rx="2"/>
<text x="${x+barW/2}" y="105" text-anchor="middle" font-size="8" fill="#666">${label}</text>
<text x="${x+barW/2}" y="${85-h}" text-anchor="middle" font-size="7" fill="#1b3f6e">$${Math.round(m.total/1000)}k</text>`;
  }).join('');
  const chartSvg=`<svg width="480" height="115" xmlns="http://www.w3.org/2000/svg">${bars}</svg>`;

  // Tabla meses
  const mesRows=sortedMon.map(m=>`

          <tbody>${sesRows}</tbody>

            <tr style="background:#f0f3f8;font-weight:700;border-top:2px solid #1b3f6e">
              <td colspan="4" style="padding:8px">Total ${year}</td>

              <td colspan="2"></td>
            </tr>
          </tfoot>
        </table>
      </div>`;
  }).join('');

  const html=`<!DOCTYPE html>

  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px">
    <div style="background:#1b3f6e;border-radius:10px;padding:16px;color:#fff">
      <div style="font-size:10px;opacity:.6;text-transform:uppercase;margin-bottom:6px">Total facturado</div>
      <div style="font-size:22px;font-weight:700">$${fmt(total)}</div>
      <div style="font-size:11px;opacity:.5;margin-top:4px">${yearSessions.length} sesiones · ${patientsWithSessions.length} pacientes</div>
    </div>
    <div style="background:#e6f5ef;border-radius:10px;padding:16px">
      <div style="font-size:10px;color:#1a7a5a;text-transform:uppercase;margin-bottom:6px">Cobrado</div>
      <div style="font-size:22px;font-weight:700;color:#1a7a5a">$${fmt(cobrado)}</div>
    </div>
    <div style="background:#e8f0fb;border-radius:10px;padding:16px">
      <div style="font-size:10px;color:#1a5fa8;text-transform:uppercase;margin-bottom:6px">Pagado</div>
      <div style="font-size:22px;font-weight:700;color:#1a5fa8">$${fmt(pagado)}</div>
    </div>
    <div style="background:#fdeaea;border-radius:10px;padding:16px">
      <div style="font-size:10px;color:#b83232;text-transform:uppercase;margin-bottom:6px">Pendiente</div>
      <div style="font-size:22px;font-weight:700;color:#b83232">$${fmt(pendiente)}</div>
    </div>
  </div>

  <!-- GRÁFICO -->
  <div style="margin-bottom:28px">
    <div style="font-size:11px;font-weight:600;color:#8c96b0;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Ingresos por mes</div>
    ${chartSvg}
  </div>

  <!-- TABLA MESES -->
  <div style="margin-bottom:28px">
    <div style="font-size:11px;font-weight:600;color:#8c96b0;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Detalle por mes</div>
    <table>
      <thead><tr><th>Mes</th><th style="text-align:center">Ses.</th><th style="text-align:right">Total</th><th style="text-align:right">Cobrado</th><th style="text-align:right">Pagado</th><th style="text-align:right">Pendiente</th></tr></thead>
      <tbody>${mesRows}</tbody>
      <tfoot><tr style="background:#f0f3f8;font-weight:700;border-top:2px solid #1b3f6e">
        <td>Total ${year}</td><td style="text-align:center">${yearSessions.length}</td>
        <td style="text-align:right">$${fmt(total)}</td>
        <td style="text-align:right;color:#1a7a5a">$${fmt(cobrado)}</td>
        <td style="text-align:right;color:#1a5fa8">$${fmt(pagado)}</td>
        <td style="text-align:right;color:#b83232">$${fmt(pendiente)}</td>
      </tr></tfoot>
    </table>
  </div>

  <!-- TABLA PREVISIONES -->
  <div>
    <div style="font-size:11px;font-weight:600;color:#8c96b0;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Por previsión</div>
    <table>
      <thead><tr><th>Previsión</th><th style="text-align:center">Sesiones</th><th style="text-align:right">Total</th></tr></thead>
      <tbody>${prevRows}</tbody>
    </table>
  </div>
</div>

<!-- PÁGINAS DE PACIENTES -->
${patientPages}

</body></html>`;

  // Abrir en nueva ventana e imprimir
  const win=window.open('','_blank');

  win.document.close();
  win.onload=()=>{
    setTimeout(()=>{win.print();},500);
  };
  sync('ok');
}
